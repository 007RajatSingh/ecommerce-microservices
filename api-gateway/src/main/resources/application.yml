server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
  admin-secret: ${JWT_ADMIN_SECRET:2D01B948F2627711BFB2519A48E2D9C3EBFD89FE6BC13CB1EC598F1CB3299049}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
          routes:
            # 1. Product Service (Public)
            - id: product-service-public
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
                - Method=GET
              filters:
                - name: CircuitBreaker
                  args:
                    name: productCircuitBreaker
                    fallbackUri: forward:/fallback/product
            
            # 1b. Product Service (Admin Only)
            - id: product-service-admin
              uri: lb://product-service
              predicates:
                - Path=/api/products/**
                - Method=POST,PUT,DELETE
              filters:
                - AdminAuthenticationFilter
                - name: CircuitBreaker
                  args:
                    name: productCircuitBreaker
                    fallbackUri: forward:/fallback/product
            
            # 2. Order Service
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**,/api/cart/**
              filters:
                - AuthenticationFilter
                - name: CircuitBreaker
                  args:
                    name: orderCircuitBreaker
                    fallbackUri: forward:/fallback/order

            # 3. Inventory Service
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/inventory/**
              filters:
                - AdminAuthenticationFilter
                - name: CircuitBreaker
                  args:
                    name: inventoryCircuitBreaker
                    fallbackUri: forward:/fallback/inventory

            # 4. Auth Service
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: authCircuitBreaker
                    fallbackUri: forward:/fallback/auth

            # 5. Admin Auth Service
            - id: admin-auth-service
              uri: lb://admin-auth-service
              predicates:
                - Path=/admin/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: adminAuthCircuitBreaker
                    fallbackUri: forward:/fallback/adminAuth

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

resilience4j:
  circuitbreaker:
    instances:
      orderCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10          # Monitor last 10 calls
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s    # Wait 5s before trying again
        failureRateThreshold: 50       # Open circuit if 50% fail
      inventoryCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      productCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      authCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
      adminAuthCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  timelimiter:
    instances:
      orderCircuitBreaker:
        timeoutDuration: 3s         # Timeout after 3s
management:
  tracing:
    sampling:
      probability: 1.0               # Sample all requests for tracing
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans